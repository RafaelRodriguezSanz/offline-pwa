<section id="water-app" class="app-section">
  <div class="water-container">
    <div class="water-card">
      <div class="glass-visual">
        <div class="glass-container">
          <div id="water-fill" class="water-fill">
            <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
              <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
              </defs>
              <g class="parallax">
                <use href="#gentle-wave" x="48" y="0" fill="rgba(56, 189, 248, 0.7)" />
                <use href="#gentle-wave" x="48" y="3" fill="rgba(56, 189, 248, 0.5)" />
                <use href="#gentle-wave" x="48" y="5" fill="rgba(56, 189, 248, 0.3)" />
                <use href="#gentle-wave" x="48" y="7" fill="#38bdf8" />
              </g>
            </svg>
          </div>
        </div>
        <div id="water-count" class="count-display">0 / 12</div>
      </div>

      <div class="water-actions">
        <button id="btn-remove-water" class="btn-water-action secondary" title="Remove glass">
          <span>−</span>
        </button>
        <button id="btn-add-water" class="btn-water-add">
          <span class="plus">+</span>
          <span class="label">Drink Glass</span>
        </button>
      </div>
      
      <p class="notif-hint">Daily Goal: 12 Glasses</p>
    </div>
  </div>
</section>
