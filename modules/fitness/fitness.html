<!-- modules/fitness/fitness.html -->
<div class="fitness-container">
  <div class="header-section">
    <h2>Mi Rutina de Fitness 💪</h2>
    <p>Selecciona un día para ver tu rutina y el mapa muscular.</p>
  </div>

  <div class="days-filter" id="fitness-days">
    <button class="day-btn active" data-day="Lunes">Lunes</button>
    <button class="day-btn" data-day="Martes">Martes</button>
    <button class="day-btn" data-day="Miércoles">Miércoles</button>
    <button class="day-btn" data-day="Jueves">Jueves</button>
    <button class="day-btn" data-day="Viernes">Viernes</button>
    <button class="day-btn" data-day="Sábado">Sábado</button>
    <button class="day-btn" data-day="Domingo">Domingo</button>
  </div>

  <div id="body-map-wrapper" class="global-body-map">
    <!-- Global body map SVG will be loaded here -->
  </div>

  <div class="exercises-section">
    <div class="exercises-section-header">
      <h3>Ejercicios</h3>
      <span class="exercise-count" id="exercise-count">0 ejercicios</span>
    </div>
    <div class="exercises-list" id="exercises-list">
      <!-- Exercises will be populated here -->
    </div>
  </div>
</div>
