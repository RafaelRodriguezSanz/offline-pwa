<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Offline-first notes app with daily Google Drive backup." />

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LocalSync" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <title>LocalSync</title>

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Apple touch icon (fallback to 512 png) -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Google fonts: DM Mono + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="app-shell">

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header>
      <div class="logo">multi<span>pwa</span></div>
      <div id="sync-status" role="status" aria-live="polite"></div>
    </header>

    <!-- ── Notification permission banner ─────────────────────────── -->
    <div id="notif-banner" hidden role="alert">
      <p>Enable notifications for sync reminders and hydration alerts.</p>
      <div class="btn-row">
        <button id="btn-allow-notif" class="btn-primary">Allow</button>
        <button id="btn-dismiss-notif" class="btn-secondary">Not now</button>
      </div>
    </div>

    <!-- ── Notes App ──────────────────────────────────────────────── -->
    <div id="notes-app" class="app-section">
      <!-- ── Input ──────────────────────────────────────────────────── -->
      <section class="input-section" aria-label="Add a new note">
        <textarea id="note-input" placeholder="Write a note… (Ctrl+Enter to save)" aria-label="Note text"></textarea>

        <div class="btn-row">
          <button id="btn-save" class="btn-primary">Save</button>
          <button id="btn-sync" class="btn-secondary">Sync now →</button>
        </div>
      </section>

      <!-- ── Meta bar: last sync + offline indicator ─────────────────── -->
      <div class="meta-bar">
        <span id="last-sync-text">Checking…</span>
        <span class="offline-badge" aria-live="polite">offline</span>
      </div>

      <!-- ── Notes list ─────────────────────────────────────────────── -->
      <section class="items-section" aria-label="Saved notes">
        <h2>Notes</h2>
        <ul id="items-list" aria-live="polite"></ul>
      </section>
    </div>

    <!-- ── Water Tracker App ──────────────────────────────────────── -->
    <div id="water-app" class="app-section" hidden>
      <section class="water-container">
        <div class="water-card">
          <h2>Hydration Tracker</h2>
          <div class="water-stats">
            <div id="water-count" class="count-display">0 / 12</div>
            <p>Target: 12 glasses / day</p>
          </div>
          
          <div class="progress-container">
            <div id="water-progress-fill" class="progress-fill"></div>
          </div>

          <button id="btn-add-water" class="btn-water-add">
            <span class="plus">+</span>
            <span class="label">Drink Glass</span>
          </button>
          
          <p class="notif-hint">Notifications: 9 AM - 9 PM hourly</p>
        </div>
      </section>
    </div>

    <!-- ── Tasks App ────────────────────────────────────────────── -->
    <div id="tasks-app" class="app-section" hidden>
      <section class="tasks-container">
        <div class="water-card">
          <h2>Tasks</h2>
          <p class="muted">Task management coming soon...</p>
        </div>
      </section>
    </div>

    <!-- ── Navigation ────────────────────────────────────────────── -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-target="notes-app">
        <span class="icon">📝</span>
        <span class="label">Notes</span>
      </button>
      <button class="nav-item" data-target="water-app">
        <span class="icon">💧</span>
        <span class="label">Water</span>
      </button>
      <button class="nav-item" data-target="tasks-app">
        <span class="icon">✅</span>
        <span class="label">Tasks</span>
      </button>
    </nav>

  </main>

  <!--
    Google Identity Services script.
    "onload" calls window.onGISLoad() which is defined in app.js
    after the module has booted — this avoids a race condition.
  -->
  <script src="https://accounts.google.com/gsi/client" async onload="window.onGISLoad?.()"></script>

  <!-- ES module entry point -->
  <script type="module" src="./app.js"></script>
</body>

</html>
